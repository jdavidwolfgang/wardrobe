<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>David · Style System</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F0EDE6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  input, select, button { font-family: inherit; }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
  ::-webkit-scrollbar { display: none; }
  scrollbar-width: none;

  /* ── MOBILE (default) ── */
  .app-shell { display: flex; flex-direction: column; min-height: 100vh; }
  .app-header { background: #1C3557; padding: 16px 18px 14px; position: sticky; top: 0; z-index: 10; }
  .app-sidebar { display: none; }
  .app-content { flex: 1; padding: 18px; padding-bottom: 88px; }
  .app-tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #FFF; border-top: 1px solid #E0DDD6; display: flex; padding: 8px 0 16px; z-index: 10; }
  .desktop-section-title { display: none; }
  .items-grid { display: flex; flex-direction: column; gap: 8px; }
  .items-grid-single { display: flex; flex-direction: column; gap: 8px; }
  .cat-pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 14px; }

  /* ── DESKTOP ── */
  @media (min-width: 700px) {
    body { background: #E0DDD6; }
    .app-shell { flex-direction: row; }
    .app-header { display: none; }
    .app-sidebar {
      position: fixed; left: 0; top: 0;
      width: 220px; height: 100vh;
      background: #1C3557;
      display: flex; flex-direction: column;
      padding: 28px 0 24px;
      overflow-y: auto;
      z-index: 20;
      flex-shrink: 0;
    }
    .sidebar-brand { padding: 0 22px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .sidebar-brand p { font-size: 10px; color: #7AAAC8; font-weight: 700; letter-spacing: 0.14em; margin: 0 0 4px; }
    .sidebar-brand h1 { font-size: 20px; font-weight: 700; color: #FFF; letter-spacing: -0.02em; margin: 0; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
    .sidebar-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      background: none; border: none; cursor: pointer;
      color: #7AAAC8; font-size: 14px; font-weight: 600;
      text-align: left; width: 100%;
    }
    .sidebar-btn.active { background: rgba(255,255,255,0.14); color: #FFF; }
    .sidebar-btn:hover:not(.active) { background: rgba(255,255,255,0.07); color: #A8C8E0; }
    .sidebar-icon { font-size: 18px; flex-shrink: 0; }
    .app-content {
      margin-left: 220px;
      min-height: 100vh;
      padding: 36px 48px;
      max-width: 960px;
    }
    .desktop-section-title { display: block; font-size: 28px; font-weight: 700; color: #1A1A1A; letter-spacing: -0.02em; margin: 0 0 28px; }
    .app-tabbar { display: none; }
    .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-pills { flex-wrap: wrap; overflow-x: visible; padding-bottom: 0; margin-bottom: 16px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── STORAGE ───────────────────────────────────────────────────────────────────
const S = {
  get(key, fb = null) { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

    { id: "gray-chinos", name: "Gray Chinos", color: "#8A8A8A", notes: "Goodfellow 30x30 slim.", status: "owned" },
    { id: "charcoal-chinos", name: "Charcoal Chinos", color: "#3C3C3C", notes: "Heavy. Use with darker or mid-tone tops only.", status: "owned" },
    { id: "blue-chinos", name: "Blue Chinos", color: "#5C7A99", notes: "J.Crew Factory. Reads as cool neutral. Avoid navy tops.", status: "owned" },
    { id: "dark-jeans", name: "Dark Navy Jeans", color: "#1C2A3A", notes: "Multiple pairs.", status: "owned" },
  ],

    { id: "brown-shoes", name: "Brown Leather Dress Shoes", color: "#6B3A2A", notes: "Elevate any outfit. Use as travel default.", status: "owned" },
    { id: "cole-haan", name: "Cole Haan Grand Crosscourt II", color: "#9B7A5A", notes: "Tan Leather Burnish. Elevates smart-casual without dress shoe formality.", status: "owned" },
  ],
};

const DEFAULT_CATEGORIES = [
  { key: "polos", label: "Polos", role: "top" },
  { key: "buttonUps", label: "Button-Ups", role: "top" },
  { key: "layers", label: "Layers", role: "layer" },
  { key: "bottoms", label: "Bottoms", role: "bottom" },
  { key: "footwear", label: "Footwear", role: "footwear" },
];

const ROLES = [
  { value: "top", label: "Top (appears in outfit log)" },
  { value: "layer", label: "Layer (appears in outfit log)" },
  { value: "bottom", label: "Bottom (appears in outfit log)" },
  { value: "footwear", label: "Footwear (appears in outfit log)" },
  { value: "other", label: "Other (reference only)" },

  { top: "Olive Polo", topColor: "#5C6B3A", khaki: 8, gray: 8, charcoal: 6, blue: 7, darkJeans: 8 },
  { top: "Light Blue Polo", topColor: "#A8C4D8", khaki: 8, gray: 7, charcoal: 7, blue: 8, darkJeans: 7 },
  { top: "Cream Polo", topColor: "#E0D8C0", khaki: 8, gray: 7.5, charcoal: null, blue: 7, darkJeans: 6 },
  { top: "Cream Stripe Polo", topColor: "#E0D8C0", khaki: 8, gray: 7.5, charcoal: null, blue: 7, darkJeans: 6 },
  { top: "Blue Polo (trim)", topColor: "#4A7FB5", khaki: 7.5, gray: 6, charcoal: 7, blue: null, darkJeans: 6 },
  { top: "Gray Polo", topColor: "#8A8A8A", khaki: 7.5, gray: null, charcoal: 7.5, blue: 7, darkJeans: 7 },

  { outfit: "Navy Polo + Khaki Chinos + White Sneakers", score: 9, notes: "Confirmed 7/2/26" },

  { outfit: "Olive Overshirt + Cream Tee + Dark Jeans", score: 8, notes: "Cream slightly weak" },

  { outfit: "Cream Stripe Polo + Khaki Chinos + White Sneakers", score: 7, notes: "Polo fit pulls slightly" },
  { outfit: "Cream Polo + Dark Jeans", score: 5.5, notes: "Light top + dark jeans ceiling" },
  { outfit: "Light Blue Oxford + Dark Jeans", score: 5, notes: "Weakest combo on trip" },
];

const BOTTOMS_COLS = [
  { key: "khaki", label: "Khaki" },
  { key: "gray", label: "Gray" },
  { key: "charcoal", label: "Charcoal" },
  { key: "blue", label: "Blue" },
  { key: "darkJeans", label: "Jeans" },
];

const TABS = [
  { id: "inventory", label: "Wardrobe", icon: "◈" },
  { id: "pairings", label: "Pairings", icon: "⊞" },
  { id: "log", label: "Log", icon: "◷" },
  { id: "gaps", label: "Gaps", icon: "◎" },
];

const GAP_STATUS_MAP = {
  incoming: { bg: "#E8F0E0", text: "#2D5428", label: "Incoming" },
  pending: { bg: "#E8E4F0", text: "#3A2A6B", label: "Pending" },
  hold: { bg: "#F0EDE6", text: "#6B5A3A", label: "On Hold" },
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function scoreStyle(score) {
  if (score === null) return { bg: "#EDEAE4", text: "#9A8A78" };
  if (score >= 9)   return { bg: "#C8DFC4", text: "#1E4820" };
  if (score >= 8.5) return { bg: "#D0E4CC", text: "#265228" };
  if (score >= 8)   return { bg: "#D8E8D0", text: "#2E5A30" };
  if (score >= 7.5) return { bg: "#E4EAD0", text: "#3C5220" };
  if (score >= 7)   return { bg: "#EEE8CC", text: "#5C4E18" };
  if (score >= 6)   return { bg: "#EEE0C0", text: "#6B3E10" };
  return { bg: "#EDD4CC", text: "#6B2218" };
}

function buildOutfitString(top, layer, bottom, footwear) {
  return [layer, top, bottom, footwear].filter(Boolean).join(" + ");
}

function normalizeOutfit(s) {
  return s.toLowerCase().replace(/\s+/g, " ").trim();
}

function initWardrobe() {
  const stored = S.get("wardrobe-v2");
  if (stored) return stored;
  const w = {};
  for (const [k, v] of Object.entries(DEFAULT_WARDROBE)) w[k] = v.map(i => ({ ...i }));
  S.set("wardrobe-v2", w);
  return w;
}

// ── SHARED STYLES ─────────────────────────────────────────────────────────────
const IS = { width: "100%", padding: "9px 11px", border: "1px solid #DDD8D0", borderRadius: "7px", fontSize: "14px", background: "#FAFAF7", color: "#1A1A1A", outline: "none" };
const LS = { fontSize: "11px", color: "#9A8A78", fontWeight: "700", display: "block", marginBottom: "5px", letterSpacing: "0.06em" };

// ── ATOMS ─────────────────────────────────────────────────────────────────────
function Swatch({ color, size = 13 }) {
  return <span style={{ display: "inline-block", width: size, height: size, borderRadius: "50%", background: color, border: "1px solid rgba(0,0,0,0.14)", flexShrink: 0 }} />;
}

function ScorePill({ score }) {
  const s = scoreStyle(score);
  return <span style={{ background: s.bg, color: s.text, padding: "3px 9px", borderRadius: "5px", fontSize: "12px", fontWeight: "700", whiteSpace: "nowrap" }}>{score === null ? "AVOID" : `${score}/10`}</span>;
}

function Pill({ label, active, onClick }) {
  return <button onClick={onClick} style={{ padding: "6px 14px", borderRadius: "20px", border: "none", background: active ? "#1C3557" : "#E8E4DC", color: active ? "#FFF" : "#4A4A4A", fontSize: "13px", fontWeight: "600", cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>{label}</button>;
}

function DashedBtn({ label, onClick }) {
  return <button onClick={onClick} style={{ width: "100%", marginTop: "10px", padding: "11px", background: "transparent", border: "1.5px dashed #B8A882", borderRadius: "10px", color: "#8A6A3A", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>{label}</button>;
}

// ── ITEM FORM (shared add / edit) ─────────────────────────────────────────────
function ItemForm({ initial, onSave, onCancel, title }) {
  const [name, setName] = useState(initial?.name || "");
  const [color, setColor] = useState(initial?.color || "#888888");
  const [notes, setNotes] = useState(initial?.notes || "");
  const [status, setStatus] = useState(initial?.status || "owned");
  const ok = name.trim().length > 0;
  return (
    <div style={{ background: "#EEE8DC", borderRadius: "10px", padding: "14px", marginTop: "8px", border: "1.5px dashed #B8A882" }}>
      <p style={{ margin: "0 0 11px", fontSize: "11px", fontWeight: "700", color: "#6B5A3A", letterSpacing: "0.06em" }}>{title}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
        <div><label style={LS}>NAME</label><input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Burgundy Polo" style={IS} /></div>
        <div style={{ display: "flex", gap: "10px" }}>
          <div style={{ flex: 1 }}>
            <label style={LS}>COLOR</label>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <input type="color" value={color} onChange={e => setColor(e.target.value)} style={{ width: "42px", height: "38px", border: "1px solid #DDD8D0", borderRadius: "6px", cursor: "pointer", padding: "2px" }} />
              <span style={{ fontSize: "11px", color: "#6B6B6B", fontFamily: "monospace" }}>{color}</span>
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <label style={LS}>STATUS</label>
            <select value={status} onChange={e => setStatus(e.target.value)} style={{ ...IS, appearance: "none" }}>
              <option value="owned">Owned</option>
              <option value="incoming">Incoming</option>
            </select>
          </div>
        </div>
        <div><label style={LS}>NOTES (OPTIONAL)</label><input value={notes} onChange={e => setNotes(e.target.value)} placeholder="Pairing rules, fit notes..." style={IS} /></div>
        <div style={{ display: "flex", gap: "8px" }}>
          <button onClick={() => ok && onSave({ name: name.trim(), color, notes: notes.trim(), status })}
            style={{ flex: 1, padding: "10px", background: ok ? "#1C3557" : "#B0C4D8", color: "#FFF", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: ok ? "pointer" : "default" }}>Save</button>
          <button onClick={onCancel} style={{ flex: 1, padding: "10px", background: "#E8E4DC", color: "#4A4A4A", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── INVENTORY TAB ─────────────────────────────────────────────────────────────
function InventoryTab() {
  const [wardrobe, setWardrobe] = useState(() => initWardrobe());
  const [customCats, setCustomCats] = useState(() => S.get("custom-cats-v1", []));
  const [cat, setCat] = useState("polos");
  const [mode, setMode] = useState(null); // null | "add" | { id, item } for edit
  const [showAddCat, setShowAddCat] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [newCatRole, setNewCatRole] = useState("top");
  const [confirmDelete, setConfirmDelete] = useState(null); // item id

  const allCats = [...DEFAULT_CATEGORIES, ...customCats];

  function saveWardrobe(w) { S.set("wardrobe-v2", w); setWardrobe(w); }

  function addItem(fields) {
    const item = { ...fields, id: `item-${Date.now()}` };
    const w = { ...wardrobe, [cat]: [...(wardrobe[cat] || []), item] };
    saveWardrobe(w); setMode(null);
  }

  function editItem(id, fields) {
    const w = { ...wardrobe, [cat]: wardrobe[cat].map(i => i.id === id ? { ...i, ...fields } : i) };
    saveWardrobe(w); setMode(null);
  }

  function deleteItem(id) {
    const w = { ...wardrobe, [cat]: wardrobe[cat].filter(i => i.id !== id) };
    saveWardrobe(w); setConfirmDelete(null);
  }

  function addCategory() {
    if (!newCatName.trim()) return;
    const newCat = { key: `cat-${Date.now()}`, label: newCatName.trim(), role: newCatRole };
    const updated = [...customCats, newCat];
    S.set("custom-cats-v1", updated); setCustomCats(updated);
    setNewCatName(""); setNewCatRole("top"); setShowAddCat(false);
    setCat(newCat.key);
  }

  function deleteCategory(key) {
    const updated = customCats.filter(c => c.key !== key);
    S.set("custom-cats-v1", updated); setCustomCats(updated);
    const w = { ...wardrobe };
    delete w[key];
    saveWardrobe(w);
    setCat("polos");
  }

  const items = wardrobe[cat] || [];
  const currentCat = allCats.find(c => c.key === cat);

  return (
    <div>
      {/* Category pills */}
      <div className="cat-pills">
        {allCats.map(c => <Pill key={c.key} label={c.label} active={cat === c.key} onClick={() => { setCat(c.key); setMode(null); setConfirmDelete(null); }} />)}
        <Pill label="+ Category" active={false} onClick={() => setShowAddCat(true)} />
      </div>

      {/* Add category form */}
      {showAddCat && (
        <div style={{ background: "#EEE8DC", borderRadius: "10px", padding: "14px", marginBottom: "12px", border: "1.5px dashed #B8A882" }}>
          <p style={{ margin: "0 0 11px", fontSize: "11px", fontWeight: "700", color: "#6B5A3A", letterSpacing: "0.06em" }}>NEW CATEGORY</p>
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            <div><label style={LS}>NAME</label><input value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="e.g. Accessories" style={IS} /></div>
            <div>
              <label style={LS}>ROLE IN OUTFIT LOG</label>
              <select value={newCatRole} onChange={e => setNewCatRole(e.target.value)} style={{ ...IS, appearance: "none" }}>
                {ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
              </select>
            </div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button onClick={addCategory} style={{ flex: 1, padding: "10px", background: newCatName.trim() ? "#1C3557" : "#B0C4D8", color: "#FFF", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: newCatName.trim() ? "pointer" : "default" }}>Add Category</button>
              <button onClick={() => { setShowAddCat(false); setNewCatName(""); }} style={{ flex: 1, padding: "10px", background: "#E8E4DC", color: "#4A4A4A", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Custom category delete option */}
      {currentCat && customCats.find(c => c.key === cat) && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "8px" }}>
          <button onClick={() => deleteCategory(cat)} style={{ background: "none", border: "none", color: "#B08070", fontSize: "12px", fontWeight: "600", cursor: "pointer" }}>Delete "{currentCat.label}" category</button>
        </div>
      )}

      {/* Items */}
      <div className="items-grid">
        {items.map(item => (
          <div key={item.id}>
            {mode && mode.id === item.id ? (
              <ItemForm
                title="EDIT ITEM"
                initial={item}
                onSave={fields => editItem(item.id, fields)}
                onCancel={() => setMode(null)}
              />
            ) : confirmDelete === item.id ? (
              <div style={{ background: "#F0E0D4", borderRadius: "10px", padding: "12px 14px", border: "1px solid #D4906A" }}>
                <p style={{ fontSize: "13px", fontWeight: "600", color: "#6B2A10", margin: "0 0 10px" }}>Remove "{item.name}"?</p>
                <div style={{ display: "flex", gap: "8px" }}>
                  <button onClick={() => deleteItem(item.id)} style={{ flex: 1, padding: "9px", background: "#8B3A1A", color: "#FFF", border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Remove</button>
                  <button onClick={() => setConfirmDelete(null)} style={{ flex: 1, padding: "9px", background: "#E8E4DC", color: "#4A4A4A", border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Cancel</button>
                </div>
              </div>
            ) : (
              <div style={{ background: "#FAFAF7", borderRadius: "10px", padding: "12px 14px", display: "flex", alignItems: "flex-start", gap: "12px", border: item.status === "incoming" ? "1.5px solid #B8A882" : "1px solid #E4E0D8" }}>
                <div style={{ paddingTop: "1px" }}><Swatch color={item.color} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px" }}>
                    <span style={{ fontSize: "14px", fontWeight: "600", color: "#1A1A1A" }}>{item.name}</span>
                    <div style={{ display: "flex", gap: "10px", alignItems: "center", flexShrink: 0 }}>
                      {item.status === "incoming" && <span style={{ fontSize: "10px", background: "#F0E8D4", color: "#8A6A2A", padding: "2px 7px", borderRadius: "4px", fontWeight: "600" }}>INCOMING</span>}
                      <button onClick={() => { setMode({ id: item.id }); setConfirmDelete(null); }} style={{ background: "none", border: "none", color: "#9A8A78", cursor: "pointer", fontSize: "13px", padding: 0 }} title="Edit">✎</button>
                      <button onClick={() => { setConfirmDelete(item.id); setMode(null); }} style={{ background: "none", border: "none", color: "#C0A898", cursor: "pointer", fontSize: "15px", padding: 0, lineHeight: 1 }} title="Delete">✕</button>
                    </div>
                  </div>
                  {item.notes && <p style={{ fontSize: "12px", color: "#7A7A7A", margin: "4px 0 0", lineHeight: "1.45" }}>{item.notes}</p>}
                </div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Add item */}
      {mode === "add" ? (
        <ItemForm title="NEW ITEM" onSave={addItem} onCancel={() => setMode(null)} />
      ) : (
        !mode && <DashedBtn label={`+ Add Item to ${currentCat?.label || "Category"}`} onClick={() => setMode("add")} />
      )}
    </div>
  );
}

// ── PAIRINGS TAB ──────────────────────────────────────────────────────────────
function PairingsTab() {
  const [view, setView] = useState("matrix");
  const logEntries = S.get("outfit-log-v1", []);

  // Merge hardcoded + logged outfits, deduplicate by normalized outfit string
  const logMapped = logEntries.map(e => ({ outfit: e.outfit, score: e.score, notes: e.notes || "", source: "log", date: e.date }));
  const hardcodedNorms = new Set(CONFIRMED_OUTFITS.map(o => normalizeOutfit(o.outfit)));
  const uniqueLogEntries = logMapped.filter(e => !hardcodedNorms.has(normalizeOutfit(e.outfit)));
  const allOutfits = [
    ...CONFIRMED_OUTFITS.map(o => ({ ...o, source: "reference" })),
    ...uniqueLogEntries,
  ].sort((a, b) => b.score - a.score);

  return (
    <div>
      <div style={{ display: "flex", gap: "6px", marginBottom: "16px" }}>
        <Pill label="Score Matrix" active={view === "matrix"} onClick={() => setView("matrix")} />
        <Pill label="Confirmed Outfits" active={view === "confirmed"} onClick={() => setView("confirmed")} />
      </div>
      {view === "matrix" ? (
        <div>
          <p style={{ fontSize: "11px", color: "#9A8A78", margin: "0 0 10px", letterSpacing: "0.04em", fontWeight: "600" }}>TOPS → BOTTOMS</p>
          <div style={{ overflowX: "auto", borderRadius: "10px", border: "1px solid #E4E0D8", background: "#FAFAF7" }}>
            <table style={{ borderCollapse: "collapse", width: "100%", minWidth: "340px" }}>
              <thead>
                <tr style={{ borderBottom: "1.5px solid #E0DDD6" }}>
                  <th style={{ padding: "9px 10px", textAlign: "left", fontSize: "10px", color: "#9A8A78", fontWeight: "700", letterSpacing: "0.06em", minWidth: "120px" }}>TOP</th>
                  {BOTTOMS_COLS.map(b => <th key={b.key} style={{ padding: "9px 6px", textAlign: "center", fontSize: "10px", color: "#9A8A78", fontWeight: "700", letterSpacing: "0.06em" }}>{b.label.toUpperCase()}</th>)}
                </tr>
              </thead>
              <tbody>
                {PAIRING_SCORES.map((row, i) => (
                  <tr key={i} style={{ borderBottom: i < PAIRING_SCORES.length - 1 ? "1px solid #EDEAE4" : "none" }}>
                    <td style={{ padding: "8px 10px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "7px" }}>
                        <Swatch color={row.topColor} size={9} />
                        <span style={{ fontSize: "12px", fontWeight: "600", color: "#1A1A1A" }}>{row.top}</span>
                      </div>
                    </td>
                    {BOTTOMS_COLS.map(b => {
                      const score = row[b.key]; const s = scoreStyle(score);
                      return <td key={b.key} style={{ padding: "5px 4px", textAlign: "center" }}>
                        <span style={{ display: "inline-block", background: s.bg, color: s.text, padding: "3px 4px", borderRadius: "4px", fontSize: "11px", fontWeight: "700", minWidth: "34px" }}>{score === null ? "✕" : score}</span>
                      </td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ) : (
        <div className="items-grid-single">
          {allOutfits.map((o, i) => (
            <div key={i} style={{ background: "#FAFAF7", borderRadius: "10px", padding: "12px 14px", border: "1px solid #E4E0D8", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "10px" }}>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: "14px", fontWeight: "600", color: "#1A1A1A", margin: 0, lineHeight: "1.35" }}>{o.outfit}</p>
                <div style={{ display: "flex", gap: "10px", marginTop: "4px", flexWrap: "wrap" }}>
                  {o.notes && <p style={{ fontSize: "12px", color: "#7A7A7A", margin: 0 }}>{o.notes}</p>}
                  {o.date && <p style={{ fontSize: "11px", color: "#B0A898", margin: 0 }}>{o.date}</p>}
                </div>
              </div>
              <ScorePill score={o.score} />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── LOG TAB ───────────────────────────────────────────────────────────────────
function PieceSelect({ label, items, value, onChange, required }) {
  return (
    <div>
      <label style={LS}>{label}{!required ? " (OPTIONAL)" : ""}</label>
      <select value={value} onChange={e => onChange(e.target.value)} style={{ ...IS, appearance: "none", color: value ? "#1A1A1A" : "#9A8A78" }}>
        <option value="">— Select —</option>
        {items.map(item => <option key={item.id} value={item.name}>{item.name}</option>)}
      </select>
    </div>
  );
}

function LogTab() {
  const [entries, setEntries] = useState(() => S.get("outfit-log-v1", []));
  const [wardrobe, setWardrobe] = useState(() => initWardrobe());
  const [customCats, setCustomCats] = useState(() => S.get("custom-cats-v1", []));
  const [adding, setAdding] = useState(false);
  const [dupWarning, setDupWarning] = useState(false);
  const today = new Date().toISOString().split("T")[0];
  const [form, setForm] = useState({ date: today, top: "", layer: "", bottom: "", footwear: "", score: "", notes: "" });

  // Merge all categories by role
  const allCats = [...DEFAULT_CATEGORIES, ...customCats];
  function itemsByRole(role) {
    return allCats.filter(c => c.role === role).flatMap(c => (wardrobe[c.key] || []).filter(i => i.status === "owned"));
  }
  const tops = itemsByRole("top");
  const layers = itemsByRole("layer");
  const bottoms = itemsByRole("bottom");
  const footwears = itemsByRole("footwear");

  function persist(updated) { S.set("outfit-log-v1", updated); setEntries(updated); }
  function upd(field, val) { setDupWarning(false); setForm(f => ({ ...f, [field]: val })); }

  const outfitStr = buildOutfitString(form.top, form.layer, form.bottom, form.footwear);
  const isComplete = form.top && form.bottom && form.footwear && form.score;

  function add() {
    if (!isComplete) return;
    if (entries.some(e => normalizeOutfit(e.outfit) === normalizeOutfit(outfitStr))) { setDupWarning(true); return; }
    persist([{ date: form.date, outfit: outfitStr, score: parseFloat(form.score), notes: form.notes, id: Date.now() }, ...entries]);
    setForm({ date: today, top: "", layer: "", bottom: "", footwear: "", score: "", notes: "" });
    setDupWarning(false); setAdding(false);
  }

  return (
    <div>
      {!adding ? (
        <button onClick={() => setAdding(true)} style={{ width: "100%", padding: "13px", background: "#1C3557", color: "#FFF", border: "none", borderRadius: "10px", fontSize: "14px", fontWeight: "600", cursor: "pointer", marginBottom: "16px" }}>+ Log an Outfit</button>
      ) : (
        <div style={{ background: "#FAFAF7", borderRadius: "10px", padding: "15px", marginBottom: "16px", border: "1.5px solid #1C3557" }}>
          <p style={{ margin: "0 0 13px", fontSize: "13px", fontWeight: "700", color: "#1C3557", letterSpacing: "0.04em" }}>NEW ENTRY</p>
          <div style={{ display: "flex", flexDirection: "column", gap: "11px" }}>
            <div><label style={LS}>DATE</label><input type="date" value={form.date} onChange={e => upd("date", e.target.value)} style={IS} /></div>
            <PieceSelect label="LAYER" items={layers} value={form.layer} onChange={v => upd("layer", v)} />
            <PieceSelect label="TOP" items={tops} value={form.top} onChange={v => upd("top", v)} required />
            <PieceSelect label="BOTTOM" items={bottoms} value={form.bottom} onChange={v => upd("bottom", v)} required />
            <PieceSelect label="FOOTWEAR" items={footwears} value={form.footwear} onChange={v => upd("footwear", v)} required />
            {outfitStr && (
              <div style={{ background: "#EEE8DC", borderRadius: "7px", padding: "10px 12px" }}>
                <p style={{ fontSize: "10px", color: "#9A8A78", margin: "0 0 3px", fontWeight: "700", letterSpacing: "0.06em" }}>OUTFIT PREVIEW</p>
                <p style={{ fontSize: "13px", fontWeight: "600", color: "#1A1A1A", margin: 0, lineHeight: "1.4" }}>{outfitStr}</p>
              </div>
            )}
            {dupWarning && <div style={{ background: "#F0E0D4", borderRadius: "7px", padding: "10px 12px", border: "1px solid #D4906A" }}><p style={{ fontSize: "13px", fontWeight: "600", color: "#8A3A10", margin: 0 }}>This combination is already in your log.</p></div>}
            <div><label style={LS}>SCORE (1–10)</label><input type="number" min="1" max="10" step="0.5" value={form.score} placeholder="e.g. 8.5" onChange={e => upd("score", e.target.value)} style={IS} /></div>
            <div><label style={LS}>NOTES (OPTIONAL)</label><input type="text" value={form.notes} placeholder="Any observations..." onChange={e => upd("notes", e.target.value)} style={IS} /></div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button onClick={add} style={{ flex: 1, padding: "11px", background: isComplete ? "#1C3557" : "#B0C4D8", color: "#FFF", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: isComplete ? "pointer" : "default" }}>Save</button>
              <button onClick={() => { setAdding(false); setDupWarning(false); }} style={{ flex: 1, padding: "11px", background: "#E8E4DC", color: "#4A4A4A", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {entries.length === 0 ? (
        <div style={{ textAlign: "center", padding: "56px 20px" }}>
          <p style={{ fontSize: "36px", margin: "0 0 12px" }}>◷</p>
          <p style={{ fontSize: "15px", color: "#4A4A4A", margin: 0, fontWeight: "600" }}>No outfits logged yet.</p>
          <p style={{ fontSize: "13px", color: "#9A8A78", margin: "8px 0 0", lineHeight: "1.6" }}>After Claude scores a fit in chat,<br />log it here to track patterns over time.</p>
        </div>
      ) : (
        <div className="items-grid-single">
          {entries.map(e => (
            <div key={e.id} style={{ background: "#FAFAF7", borderRadius: "10px", padding: "12px 14px", border: "1px solid #E4E0D8", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "10px" }}>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: "11px", color: "#9A8A78", margin: "0 0 3px", fontWeight: "600", letterSpacing: "0.04em" }}>{e.date}</p>
                <p style={{ fontSize: "14px", fontWeight: "600", color: "#1A1A1A", margin: 0, lineHeight: "1.35" }}>{e.outfit}</p>
                {e.notes && <p style={{ fontSize: "12px", color: "#7A7A7A", margin: "4px 0 0" }}>{e.notes}</p>}
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "8px" }}>
                <ScorePill score={e.score} />
                <button onClick={() => persist(entries.filter(en => en.id !== e.id))} style={{ background: "none", border: "none", color: "#C0B8A8", cursor: "pointer", fontSize: "11px", padding: 0, fontWeight: "600" }}>REMOVE</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── GAPS TAB ──────────────────────────────────────────────────────────────────
function initGaps() {
  const stored = S.get("all-gaps-v1");
  if (stored) return stored;
  const initial = DEFAULT_GAPS.map(g => ({ ...g }));
  S.set("all-gaps-v1", initial);
  return initial;
}

function GapsTab() {
  const [gaps, setGaps] = useState(() => initGaps());
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [form, setForm] = useState({ item: "", status: "pending", notes: "" });

  function persist(updated) { S.set("all-gaps-v1", updated); setGaps(updated); }

  function addGap() {
    if (!form.item.trim()) return;
    persist([...gaps, { id: `cg-${Date.now()}`, item: form.item.trim(), status: form.status, notes: form.notes.trim() }]);
    setForm({ item: "", status: "pending", notes: "" }); setShowAdd(false);
  }

  function startEdit(g) {
    setForm({ item: g.item, status: g.status, notes: g.notes || "" });
    setEditingId(g.id); setShowAdd(false); setConfirmDelete(null);
  }

  function saveEdit() {
    persist(gaps.map(g => g.id === editingId ? { ...g, item: form.item.trim(), status: form.status, notes: form.notes.trim() } : g));
    setEditingId(null);
  }

  function deleteGap(id) { persist(gaps.filter(g => g.id !== id)); setConfirmDelete(null); }

  const GapForm = ({ onSave, onCancel }) => (
    <div style={{ background: "#EEE8DC", borderRadius: "10px", padding: "14px", border: "1.5px dashed #B8A882" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
        <div><label style={LS}>ITEM</label><input value={form.item} onChange={e => setForm(f => ({ ...f, item: e.target.value }))} placeholder="e.g. Burgundy Overshirt" style={IS} /></div>
        <div>
          <label style={LS}>STATUS</label>
          <select value={form.status} onChange={e => setForm(f => ({ ...f, status: e.target.value }))} style={{ ...IS, appearance: "none" }}>
            <option value="incoming">Incoming</option>
            <option value="pending">Pending</option>
            <option value="hold">On Hold</option>
          </select>
        </div>
        <div><label style={LS}>NOTES (OPTIONAL)</label><input value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Any context..." style={IS} /></div>
        <div style={{ display: "flex", gap: "8px" }}>
          <button onClick={onSave} style={{ flex: 1, padding: "10px", background: form.item.trim() ? "#1C3557" : "#B0C4D8", color: "#FFF", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: form.item.trim() ? "pointer" : "default" }}>Save</button>
          <button onClick={onCancel} style={{ flex: 1, padding: "10px", background: "#E8E4DC", color: "#4A4A4A", border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Cancel</button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div className="items-grid">
        {gaps.map(g => {
          const s = GAP_STATUS_MAP[g.status];
          if (editingId === g.id) return <div key={g.id}><GapForm onSave={saveEdit} onCancel={() => setEditingId(null)} /></div>;
          if (confirmDelete === g.id) return (
            <div key={g.id} style={{ background: "#F0E0D4", borderRadius: "10px", padding: "12px 14px", border: "1px solid #D4906A" }}>
              <p style={{ fontSize: "13px", fontWeight: "600", color: "#6B2A10", margin: "0 0 10px" }}>Remove "{g.item}"?</p>
              <div style={{ display: "flex", gap: "8px" }}>
                <button onClick={() => deleteGap(g.id)} style={{ flex: 1, padding: "9px", background: "#8B3A1A", color: "#FFF", border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Remove</button>
                <button onClick={() => setConfirmDelete(null)} style={{ flex: 1, padding: "9px", background: "#E8E4DC", color: "#4A4A4A", border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Cancel</button>
              </div>
            </div>
          );
          return (
            <div key={g.id} style={{ background: "#FAFAF7", borderRadius: "10px", padding: "12px 14px", border: "1px solid #E4E0D8", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "10px" }}>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: "14px", fontWeight: "600", color: "#1A1A1A", margin: 0, lineHeight: "1.35" }}>{g.item}</p>
                {g.notes && <p style={{ fontSize: "12px", color: "#7A7A7A", margin: "4px 0 0", lineHeight: "1.45" }}>{g.notes}</p>}
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "6px" }}>
                <span style={{ background: s.bg, color: s.text, padding: "3px 8px", borderRadius: "4px", fontSize: "10px", fontWeight: "700", letterSpacing: "0.04em", flexShrink: 0 }}>{s.label.toUpperCase()}</span>
                <div style={{ display: "flex", gap: "10px" }}>
                  <button onClick={() => startEdit(g)} style={{ background: "none", border: "none", color: "#9A8A78", cursor: "pointer", fontSize: "13px", padding: 0 }}>✎</button>
                  <button onClick={() => { setConfirmDelete(g.id); setEditingId(null); }} style={{ background: "none", border: "none", color: "#C0A898", cursor: "pointer", fontSize: "15px", padding: 0 }}>✕</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {showAdd ? (
        <div style={{ marginTop: "10px" }}><GapForm onSave={addGap} onCancel={() => setShowAdd(false)} /></div>
      ) : (
        <DashedBtn label="+ Add Gap" onClick={() => { setShowAdd(true); setEditingId(null); }} />
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("inventory");
  const tabLabels = { inventory: "Wardrobe", pairings: "Pairings", log: "Log", gaps: "Gaps" };
  const content = { inventory: <InventoryTab />, pairings: <PairingsTab />, log: <LogTab />, gaps: <GapsTab /> };
  return (
    <div className="app-shell">
      {/* Mobile header */}
      <div className="app-header">
        <p style={{ margin: 0, fontSize: "10px", color: "#7AAAC8", fontWeight: "700", letterSpacing: "0.14em" }}>DAVID · STYLE SYSTEM</p>
        <h1 style={{ margin: "3px 0 0", fontSize: "22px", fontWeight: "700", color: "#FFF", letterSpacing: "-0.02em" }}>{tabLabels[tab]}</h1>
      </div>

      {/* Desktop sidebar */}
      <div className="app-sidebar">
        <div className="sidebar-brand">
          <p>DAVID · STYLE SYSTEM</p>
          <h1>Wardrobe</h1>
        </div>
        <nav className="sidebar-nav">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`sidebar-btn${tab === t.id ? " active" : ""}`}>
              <span className="sidebar-icon">{t.icon}</span>
              {t.label}
            </button>
          ))}
        </nav>
      </div>

      {/* Main content */}
      <div className="app-content">
        <p className="desktop-section-title">{tabLabels[tab]}</p>
        {content[tab]}
      </div>

      {/* Mobile tab bar */}
      <div className="app-tabbar">
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: "3px", padding: "4px 0" }}>
            <span style={{ fontSize: "22px", lineHeight: 1, color: tab === t.id ? "#1C3557" : "#C0B8A8" }}>{t.icon}</span>
            <span style={{ fontSize: "9px", fontWeight: "700", letterSpacing: "0.07em", color: tab === t.id ? "#1C3557" : "#C0B8A8" }}>{t.label.toUpperCase()}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
